name: Collect Proxies

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # mais tempo — o script roda na VM
    name: Collect & Publish Proxy List
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Tailscale ──────────────────────────────────────────────────────
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # ── Roda o script na VM via SSH ────────────────────────────────────
      - name: Run proxy collector on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     100.66.244.82        
          username: ${{ secrets.SSH_USER }}
          port:     ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          timeout: 30s
          command_timeout: 55m
          script: |
            set -e
            source .venv/bin/activate
            cd /root/proxy-collector     # ajuste para o caminho do seu projeto

            # Garante dependências atualizadas
            pip install -q -r requirements.txt

            # Roda o coletor
            python main.py

            echo "✅ Coleta concluída"
            echo "TOTAL=$(wc -l < proxies_all.txt | xargs)" >> /tmp/proxy_meta.env
            echo "HTTP=$(grep -c '^http://'    proxies_all.txt || true)" >> /tmp/proxy_meta.env
            echo "HTTPS=$(grep -c '^https://'  proxies_all.txt || true)" >> /tmp/proxy_meta.env
            echo "SOCKS4=$(grep -c '^socks4://' proxies_all.txt || true)" >> /tmp/proxy_meta.env
            echo "SOCKS5=$(grep -c '^socks5://' proxies_all.txt || true)" >> /tmp/proxy_meta.env

      # ── Copia o resultado da VM para o runner ─────────────────────────
      - name: Copy proxies_all.txt from VM
        run: |
          # instala sshpass para usar password auth com scp
          sudo apt-get install -y sshpass

          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
                -P ${{ secrets.SSH_PORT }} \
                ${{ secrets.SSH_USER }}@100.66.244.82:/root/proxy-collector/proxies_all.txt \
                ./proxies_all.txt

          # puxa também o arquivo de metadados
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
                -P ${{ secrets.SSH_PORT }} \
                ${{ secrets.SSH_USER }}@100.66.244.82:/tmp/proxy_meta.env \
                ./proxy_meta.env

      # ── Lê metadados ───────────────────────────────────────────────────
      - name: Collect metadata
        id: meta
        run: |
          source ./proxy_meta.env
          echo "date=$(date -u '+%Y-%m-%d')"               >> $GITHUB_OUTPUT
          echo "datetime=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "total=$TOTAL"                               >> $GITHUB_OUTPUT
          echo "http=$HTTP"                                 >> $GITHUB_OUTPUT
          echo "https=$HTTPS"                               >> $GITHUB_OUTPUT
          echo "socks4=$SOCKS4"                             >> $GITHUB_OUTPUT
          echo "socks5=$SOCKS5"                             >> $GITHUB_OUTPUT

      # ── Summary ────────────────────────────────────────────────────────
      - name: Show summary
        run: |
          {
            echo "## 🌐 Proxy Collection #${{ github.run_number }}"
            echo ""
            echo "| Info | Valor |"
            echo "|------|-------|"
            echo "| 📅 Data       | ${{ steps.meta.outputs.datetime }} |"
            echo "| 🔢 Total      | ${{ steps.meta.outputs.total }} |"
            echo ""
            echo "### Por protocolo"
            echo "| Protocolo | Qtd |"
            echo "|-----------|-----|"
            echo "| \`http\`   | ${{ steps.meta.outputs.http }} |"
            echo "| \`https\`  | ${{ steps.meta.outputs.https }} |"
            echo "| \`socks4\` | ${{ steps.meta.outputs.socks4 }} |"
            echo "| \`socks5\` | ${{ steps.meta.outputs.socks5 }} |"
          } >> $GITHUB_STEP_SUMMARY

      # ── Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: proxies-${{ github.run_number }}
          name: "Proxy List #${{ github.run_number }} — ${{ steps.meta.outputs.date }}"
          body: |
            🌐 **Lista de proxies públicos coletada automaticamente**

            📅 Data: `${{ steps.meta.outputs.datetime }}`
            🔢 Run: #${{ github.run_number }}
            📦 Total: `${{ steps.meta.outputs.total }}` proxies únicos

            | Protocolo | Qtd |
            |-----------|-----|
            | `http`    | ${{ steps.meta.outputs.http }} |
            | `https`   | ${{ steps.meta.outputs.https }} |
            | `socks4`  | ${{ steps.meta.outputs.socks4 }} |
            | `socks5`  | ${{ steps.meta.outputs.socks5 }} |

            ### Fontes
            - r00tee/Proxy-List
            - databay-labs/free-proxy-list
            - TheSpeedX/PROXY-List
            - stormsia/proxy-list
            - proxifly/free-proxy-list
            - ProxyScrape API v4

            > ⚠️ Lista gerada automaticamente. Proxies públicos podem estar offline.
          files: proxies_all.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Rotação de releases ────────────────────────────────────────────
      - name: Rotate old releases (keep 3)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
