name: Collect Proxies

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Collect & Publish Proxy List
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run proxy collector
        run: python main.py

      # ── Captura data e totais como outputs ──────────────────────────────
      - name: Collect metadata
        id: meta
        run: |
          echo "date=$(date -u '+%Y-%m-%d')"            >> $GITHUB_OUTPUT
          echo "datetime=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "total=$(wc -l < proxies_all.txt | xargs)"  >> $GITHUB_OUTPUT
          echo "http=$(grep -c '^http://'    proxies_all.txt || true)" >> $GITHUB_OUTPUT
          echo "https=$(grep -c '^https://'  proxies_all.txt || true)" >> $GITHUB_OUTPUT
          echo "socks4=$(grep -c '^socks4://' proxies_all.txt || true)" >> $GITHUB_OUTPUT
          echo "socks5=$(grep -c '^socks5://' proxies_all.txt || true)" >> $GITHUB_OUTPUT

      - name: Show summary
        run: |
          {
            echo "## 🌐 Proxy Collection #${{ github.run_number }}"
            echo ""
            echo "| Info | Valor |"
            echo "|------|-------|"
            echo "| 📅 Data       | ${{ steps.meta.outputs.datetime }} |"
            echo "| 🔢 Total      | ${{ steps.meta.outputs.total }} |"
            echo ""
            echo "### Por protocolo"
            echo "| Protocolo | Qtd |"
            echo "|-----------|-----|"
            echo "| \`http\`   | ${{ steps.meta.outputs.http }} |"
            echo "| \`https\`  | ${{ steps.meta.outputs.https }} |"
            echo "| \`socks4\` | ${{ steps.meta.outputs.socks4 }} |"
            echo "| \`socks5\` | ${{ steps.meta.outputs.socks5 }} |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: proxies-${{ github.run_number }}
          name: "Proxy List #${{ github.run_number }} — ${{ steps.meta.outputs.date }}"
          body: |
            🌐 **Lista de proxies públicos coletada automaticamente**

            📅 Data: `${{ steps.meta.outputs.datetime }}`
            🔢 Run: #${{ github.run_number }}
            📦 Total: `${{ steps.meta.outputs.total }}` proxies únicos

            | Protocolo | Qtd |
            |-----------|-----|
            | `http`    | ${{ steps.meta.outputs.http }} |
            | `https`   | ${{ steps.meta.outputs.https }} |
            | `socks4`  | ${{ steps.meta.outputs.socks4 }} |
            | `socks5`  | ${{ steps.meta.outputs.socks5 }} |

            ### Fontes
            - r00tee/Proxy-List
            - databay-labs/free-proxy-list
            - TheSpeedX/PROXY-List
            - stormsia/proxy-list
            - proxifly/free-proxy-list
            - ProxyScrape API v4

            > ⚠️ Lista gerada automaticamente. Proxies públicos podem estar offline.
          files: proxies_all.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rotate old releases (keep 3)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
